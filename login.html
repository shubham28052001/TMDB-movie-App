<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
         user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
    }

    .container {
      font-family: 'Arial', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #141414, #1f1f1f);
      color: white;
      background-image:
        url("https://assets.nflxext.com/ffe/siteui/vlv3/d13e2d55-5cdd-48c0-a55b-4b292d0b9889/web/IN-en-20251229-TRIFECTA-perspective_d7edcd70-4cfd-441c-858c-c5e400ed6c2b_large.jpg");
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(0, 0, 0, 0.5) 40%, rgba(0, 0, 0, 0.98) 100%);
      z-index: 1;
    }

    .login-container {
      background-color: rgba(0, 0, 0, 0.8);
      padding: 3rem 2rem;
      border-radius: 10px;
      width: 350px;
      z-index: 2;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
    }

    .login-container .logo {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container .logo h1 {
      text-transform: uppercase;
      color: #fc010e;
      margin: 0 0 1rem 0;
      font-size: 2rem;
    }

    .login-container h2 {
      margin-bottom: 1.5rem;
      font-size: 2rem;
      font-weight: 700;
    }

    .login-container form {
      display: flex;
      flex-direction: column;
    }

    .login-container input {
      padding: 0.8rem 1rem;
      margin-bottom: 1rem;
      border-radius: 5px;
      border: none;
      outline: none;
      font-size: 1rem;
    }

    .login-container button {
      padding: 0.8rem 1rem;
      background-color: #e50914;
      border: none;
      border-radius: 5px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .login-container button:hover {
      background-color: #bc040d;
      transform: scale(1.02);
    }

    .signup-text {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #bbbbbb;
    }

    .signup-text a {
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
    }

    .signup-text a:hover {
      text-decoration: underline;
    }

    .error {
      color: #0a0a0a;
      font-size: 1rem;
      background-color: #D89D31;
      margin: 0.5rem;
      display: none;
      padding: 20px 0px;
    }
     .logo h1{
            width: 170px;
            position: absolute;
            color: #fc010e;
            text-transform: uppercase;
            font-family: 'Arial Black', sans-serif;
            top: 20px;
            left: 50px;
            z-index: 5;
        }
        @media screen and (max-width: 768px) {
            .logo h1{
                width: 130px;
                top: 15px;
                left: 10px;
            }
        }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">
      <h1>cinverse</h1>
    </div>
    <div class="login-container">
      <p class="error"></p>
      <h2>Login</h2>
      <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
      <p class="signup-text">New to Cinverse?<a href="signup.html">Sign Up Now.</a></p>
    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>

</html>
