<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Horizontal Scroll</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    .scroll-container {
      display: flex;
      gap: 15px;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding-bottom: 10px;
    }

    /* scrollbar hide */
    .scroll-container::-webkit-scrollbar {
      display: none;
    }

    .card {
      min-width: 200px;
      height: 280px;
      background: #1f1f1f;
      border-radius: 12px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.05);
      background: #ff4757;
    }
  </style>
</head>

<body>

  <h2>🔥 Popular Movies</h2>

  <div class="scroll-container">
    <div class="card">1</div>
    <div class="card">2</div>
    <div class="card">3</div>
    <div class="card">4</div>
    <div class="card">5</div>
    <div class="card">6</div>
    <div class="card">7</div>
    <div class="card">8</div>
  </div>

</body>
</html>
