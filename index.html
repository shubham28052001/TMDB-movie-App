<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .container {
            height: 100vh;
            background-image:
                url("https://assets.nflxext.com/ffe/siteui/vlv3/d13e2d55-5cdd-48c0-a55b-4b292d0b9889/web/IN-en-20251229-TRIFECTA-perspective_d7edcd70-4cfd-441c-858c-c5e400ed6c2b_large.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.82) 40%, rgba(0, 0, 0, 0.98) 100%);
            z-index: 1;
        }

        .title {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 4;
            font-family: 'Arial', sans-serif;
            max-width: 90%;
        }

        .logo h1 {
            width: 170px;
            position: absolute;
            color: #fc010e;
            text-transform: uppercase;
            font-family: 'Arial Black', sans-serif;
            top: 20px;
            left: 50px;
            z-index: 5;
        }


        .title h1 {
            color: white;
            font-size: 3.5rem;
            text-align: center;
            max-width: 1000px;
            font-weight: 900;
            margin: 0;
            padding: 0 20px;
            line-height: 1.2;
        }

        .title a {
            margin-top: 1.5rem;
            font-size: 1.5rem;
            font-weight: 600;
            background-color: #e50914;
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            border: none;
            color: white;
            text-decoration: none;
        }


        .title a:hover {
            background-color: #bc040d;
        }

        @media screen and (max-width: 768px) {
            .title h1 {
                font-size: 2.5rem;
            }

            .title a {
                font-size: 1.2rem;
                padding: 0.6rem 1.2rem;
            }

            .logo h1 {
                width: 130px;
                top: -2px;
                left: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">
            <h1>cinverse</h1>
        </div>
        <div class="title">
            <h1>Explore unlimited movies and TV shows at your fingertips.</h1>
            <a href="login.html">Get Started ></a>
        </div>
    </div>
</body>

</html>
