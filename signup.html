<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    .container {
      font-family: 'Arial', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: url("https://assets.nflxext.com/ffe/siteui/vlv3/d13e2d55-5cdd-48c0-a55b-4b292d0b9889/web/IN-en-20251229-TRIFECTA-perspective_d7edcd70-4cfd-441c-858c-c5e400ed6c2b_large.jpg");
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      position: relative;
      color: white;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(0, 0, 0, 0.5) 40%, rgba(0, 0, 0, 0.98) 100%);
      z-index: 1;
    }

    .logo h1 {
      position: absolute;
      top: 20px;
      left: 50px;
      color: #fc010e;
      font-size: 2rem;
      font-family: 'Arial Black', sans-serif;
      text-transform: uppercase;
      z-index: 5;
    }

    @media screen and (max-width: 768px) {
      .logo h1 {
        top: 15px;
        left: 15px;
        font-size: 1.6rem;
      }
    }

    .signup-container {
      background-color: rgba(0, 0, 0, 0.8);
      padding: 3rem 2rem;
      border-radius: 10px;
      width: 350px;
      z-index: 2;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
    }

    .signup-container h2 {
      margin-bottom: 1.5rem;
      font-size: 2rem;
      font-weight: 700;
    }

    .signup-container form {
      display: flex;
      flex-direction: column;
    }

    .signup-container input {
      padding: 0.8rem 1rem;
      margin-bottom: 1rem;
      border-radius: 5px;
      border: none;
      outline: none;
      font-size: 1rem;
    }

    .signup-container button {
      padding: 0.8rem 1rem;
      background-color: #e50914;
      border: none;
      border-radius: 5px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .signup-container button:hover {
      background-color: #bc040d;
      transform: scale(1.02);
    }

    .signin-text {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #bbbbbb;
    }

    .signin-text a {
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
    }

    .signin-text a:hover {
      text-decoration: underline;
    }

    .error {
      display: none;
      background-color: #D89D31;
      color: #0a0a0a;
      padding: 15px;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="logo">
      <h1>cinverse</h1>
    </div>

    <div class="signup-container">
      <p class="error"></p>
      <h2>Signup</h2>

      <form id="signupForm">
        <input type="text" id="name" placeholder="Full Name" required />
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Signup</button>
      </form>

      <p class="signin-text">
        Already in Cinverse? <a href="login.html">Log In Now.</a>
      </p>
    </div>
  </div>

  <script type="module" src="js/signup.js"></script>

</body>

</html>
