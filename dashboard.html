<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMDB</title>
    <style>
        body {
            background: #03070b;
            color: #ffffff;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            padding-top: 50px;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 6%;
            box-sizing: border-box;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(70, 64, 64, 0.8), rgb(106, 94, 94));
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .logo h1 {
            margin: 0;
            font-size: 28px;
            color: #fc010e;
            text-transform: uppercase;
            font-family: 'Arial Black', sans-serif;
            width: 170px;
            color: #fc010e;
            text-transform: uppercase;
            font-family: 'Arial Black', sans-serif;
            z-index: 5;
        }

        .search-box input {
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 650px;
            background: rgba(15, 15, 20, 0.7);
            color: white;
            backdrop-filter: blur(15px);
            outline: none;
            transition: 0.3s;
        }

        .search-box button {
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            background: #01b4e4;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        .search-box button:hover {
            background: #0390b3;
            color: rgb(62, 61, 61);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn {
            padding: 10px 24px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.4s;
        }

        .btn:hover {
            background: white;
            color: black;
        }

        .primary {
            background: rgb(192, 19, 19);
            border-color: rgb(177, 23, 23);
        }

        .primary:hover {
            background: #b20710;
            color: white;
            transform: translateY(-2px);
        }

        .movie-layout {
            width: 92%;
            margin: 40px auto;
        }

        .movie-layout h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            border-left: 8px solid #01b4e4;
            padding-left: 15px;
        }


        .moviecontainer {
            display: flex;
            gap: 18px;
            overflow-x: auto;
            padding-bottom: 20px;
            scroll-behavior: smooth;
            opacity: 1;
            transition: opacity 0.5s ease;
            transform: translateX(0);
        }

        .moviecontainer.fade-out {
            opacity: 0;
            transform: translateX(-30px);
        }

        .moviecontainer.fade-in {
            opacity: 1;
            transform: translateX(0);
        }



        .moviecontainer::-webkit-scrollbar {
            height: 8px;
        }

        .moviecontainer::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .moviecontainer::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color);
        }



        .moviecards {
            min-width: 220px;
            height: 340px;
            background: #111;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.35s ease;
        }

        .moviecards:hover {
            transform: translateY(-10px) scale(1.06);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.8);
            border-color: #00d2ff;
        }

        .movie-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }


        .moviecards::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 10%, transparent 50%);
        }


        .movie-info {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            z-index: 2;
        }

        .movie-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            color: white;
        }

        .movie-release {
            font-size: 13px;
            color: #ccc;
        }

        .movie-scroll-wrapper {
            position: relative;
        }

        .fade-right {
            position: absolute;
            top: 0;
            right: 0;
            width: 90px;
            height: 93%;
            pointer-events: none;
            background: linear-gradient(to left,
                    #242424,
                    transparent);
            transition: opacity 0.3s ease;
        }

        .trending-toggle {
            display: inline-flex;
            border: 1px solid #01b4e4;
            border-radius: 30px;
            margin-left: 20px;
            margin-bottom: 10px;
            overflow: hidden;
            background: transparent;
        }

        .trending-toggle button {
            padding: 6px 20px;
            border: none;
            background: transparent;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .trending-toggle button.active {
            background: linear-gradient(90deg, #90cea1, #01b4e4);
            color: #050e12;
            border-radius: 25px;
        }

        .Popular-toggle {
            display: inline-flex;
            border: 1px solid #01b4e4;
            border-radius: 30px;
            margin-left: 20px;
            margin-bottom: 10px;
            overflow: hidden;
            background: transparent;
        }

        .Popular-toggle button {
            padding: 6px 20px;
            border: none;
            background: transparent;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .Popular-toggle button.active {
            background: linear-gradient(90deg, #90cea1, #01b4e4);
            color: #050e12;
            border-radius: 25px;
        }

        .toprated-toggle {
            display: inline-flex;
            border: 1px solid #01b4e4;
            border-radius: 30px;
            margin-left: 20px;
            margin-bottom: 10px;
            overflow: hidden;
            background: transparent;
        }

        .toprated-toggle button {
            padding: 6px 20px;
            border: none;
            background: transparent;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .toprated-toggle button.active {
            background: linear-gradient(90deg, #90cea1, #01b4e4);
            color: #050e12;
            border-radius: 25px;
        }

        .view-all-wrapper {
            min-width: 180px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            margin-left: 10px;
        }

        .view-all-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 14px 22px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: all 0.3s ease;
        }

        .view-all-btn:hover {
            background: #00bfff;
            color: #000;
            transform: scale(1.08);
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6%;
            gap: 50px;
            position: relative;
            transition: background 0.8s ease-in-out;
        }

        /* Dynamic Background Overlay */
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            z-index: -1;
            transition: 1s ease;

            background-size: cover;
            background-position: center;

            /* 🔥 Bottom Fade Effect */
            mask-image: linear-gradient(to bottom,
                    rgba(0, 0, 0, 1) 60%,
                    rgba(0, 0, 0, 0.8) 75%,
                    rgba(0, 0, 0, 0) 100%);

            -webkit-mask-image: linear-gradient(to bottom,
                    rgba(0, 0, 0, 1) 60%,
                    rgba(0, 0, 0, 0.8) 75%,
                    rgba(0, 0, 0, 0) 100%);
        }

        .hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 50%, rgba(8, 8, 10, 0.4) 0%, rgba(8, 8, 10, 1) 80%);
        }

        /* Poster with Glow */
        .poster {
            flex-shrink: 0;
            animation: fadeIn 1s ease;
        }

        .poster img {
            width: 300px;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Details Card */
        .details {
            max-width: 550px;
            z-index: 2;
            animation: slideUp 0.8s ease;
        }

        .details h1 {
            font-size: 64px;
            margin: 0 0 10px 0;
            font-weight: 800;
            line-height: 1.1;
            text-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .tags {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .tags span {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            border-left: 3px solid red;
        }

        .details p {
            color: #ccc;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Action Buttons */
        .watch-btn {
            background: rgb(208, 14, 14);
            color: white;
            padding: 15px 40px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .watch-btn:hover {
            background: #ff1f1f;
            transform: scale(1.05);
        }

        /* Slider Controls */
        .controls {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 5;
        }

        .controls span {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: 0.3s;
        }

        .controls span.active {
            background: #ccc;
            transform: scale(1.4);
        }

        .trailer-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            animation: fadeIn 0.4s ease;
        }

        .modal-content {
            width: 80%;
            height: 75%;
            position: relative;
        }

        .close {
            position: absolute;
            top: -45px;
            right: 0;
            font-size: 28px;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }

        .close:hover {
            color: rgb(206, 86, 86);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade {
            animation: fadeIn 0.5s ease-in-out;
        }



        /* ========================= MOBILE RESPONSIVE FIX========================= */

        @media (max-width: 768px) {

            /* body {
                overflow-x: hidden;
            } */

            .navbar {
                flex-wrap: wrap;
                gap: 15px;
                padding: 15px 5%;
            }

            .nav-left {
                width: 100%;
                justify-content: flex-end;
                gap: 10px;
            }

            .logo h1 {
                font-size: 22px;
                width: auto;
            }

            .search-box {
                width: 100%;
                display: flex;
                gap: 10px;
            }

            .search-box input {
                width: 100%;
                /* 650px hata ke full width */
                padding: 10px 15px;
                font-size: 14px;
            }

            .search-box button {
                padding: 10px 16px;
                font-size: 14px;
            }

            .nav-right {
                width: 100%;
                justify-content: flex-end;
                gap: 10px;
            }

            .btn {
                padding: 8px 16px;
                font-size: 13px;
            }


            .movie-layout {
                width: 95%;
                margin: 25px auto;
            }

            .movie-layout h2 {
                font-size: 1.3rem;
                margin-bottom: 14px;
                border-left: 5px solid #01b4e4;
                padding-left: 10px;
            }

            /* MOVIE SCROLL */
            .moviecontainer {
                gap: 10px;
                padding-bottom: 10px;
                -webkit-overflow-scrolling: touch;
            }

            .moviecontainer::-webkit-scrollbar {
                height: 0;
            }

            /* MOVIE CARD */
            .moviecards {
                min-width: 125px;
                height: 200px;
                border-radius: 12px;
            }

            .movie-title {
                font-size: 13px;
            }

            .movie-release {
                font-size: 11px;
            }

            /* FADE FIX */
            .fade-right {
                height: 95%;
            }

            /* TOGGLE BUTTONS */
            .trending-toggle,
            .Popular-toggle,
            .toprated-toggle {
                margin-left: 0;
                margin-top: 10px;
                transform: scale(0.9);
            }

            /* VIEW ALL */
            .view-all-wrapper {
                min-width: 140px;
                height: 200px;
            }

            .view-all-btn {
                padding: 10px 16px;
                font-size: 13px;
            }

            .hero {
                flex-direction: column;
                text-align: center;
                height: auto;
                padding: 100px 5% 60px;
                gap: 30px;
            }

            .poster img {
                width: 200px;
            }

            .details {
                max-width: 100%;
            }

            .details h1 {
                font-size: 36px;
            }

            .details p {
                font-size: 15px;
            }

            .tags {
                justify-content: center;
                flex-wrap: wrap;
            }

            .controls {
                bottom: 20px;
            }

            .modal-content {
                width: 95%;
                height: 60%;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">
                <h1>Cineverse</h1>
            </div>
            <div class="nav-right">
                <button class="btn">Logout</button>
                <button class="btn primary">Try for Free</button>
            </div>
        </div>
        <div class="search-box">
            <input class="search-boxinput" type="text" placeholder="Search for a movie, TV show, person..." />
            <button class="searchbtn">Search</button>
        </div>
    </nav>

    <section class="hero" id="hero-section">
        <div class="hero-bg" id="bg-image"></div>

        <div class="poster">
            <img id="poster" src="" alt="movie">
        </div>

        <div class="details">
            <div class="tags" id="genre"></div>
            <h1 id="title"></h1>
            <p id="desc"></p>
            <div class="buttons">
                <button class="watch-btn" onclick="openTrailer()">
                    <span>▶</span> WATCH TRAILER
                </button>
            </div>
        </div>

        <div class="controls" id="bullets"></div>
    </section>
    <div class="trailer-modal" id="trailerModal">
        <div class="modal-content">
            <span class="close" onclick="closeTrailer()">✖</span>
            <iframe id="youtubeFrame" width="100%" height="100%" src="" frameborder="0"
                allow="autoplay; encrypted-media" allowfullscreen>
            </iframe>
        </div>
    </div>


    <div class="movie-layout">
        <h2>Trending Movies🔥</h2>
        <div class="trending-toggle">
            <button id="trendingDay" class="active">Today</button>
            <button id="trendingWeek">This Week</button>
        </div>
        <div class="movie-scroll-wrapper">
            <div class="moviecontainer">
                <!-- Trending movies will be appended here via JS -->
            </div>

            <div class="fade-right" id="fadeRight"></div>
        </div>
    </div>


    <div class="movie-layout">
        <h2>Popular Movies🔥</h2>
        <div class="Popular-toggle">
            <button id="popularStreaming" class="active">Streaming</button>
            <button id="popularOnTv">OnTv</button>
            <button id="popularForRent">For Rent</button>
            <button id="popularInTheaters">In Theaters</button>
        </div>
        <div class="movie-scroll-wrapper">
            <div class="moviecontainer" id="popularMoviesContainer">
                <!-- Popular movies will be appended here via JS -->
            </div>
            <div class="fade-right" id="fadeRightPopular"></div>
        </div>
    </div>



    <div class="movie-layout">
        <h2>Top rated Movies🔥</h2>
        <div class="toprated-toggle">
            <button id="toprated-movies" class="active">Movies</button>
            <button id="toprated-tv">Tv</button>
        </div>
        <div class="movie-scroll-wrapper">
            <div class="moviecontainer" id="TopratedMoviesContainer">
                <!-- Toprated movies will be appended here via JS -->
            </div>
            <div class="fade-right" id="fadeRightToprated"></div>
        </div>
    </div>




    <div class="movie-layout">
        <h2>upcoming Movies🔥</h2>
        <div class="movie-scroll-wrapper">
            <div class="moviecontainer" id="UpcomingMoviesContainer">
                <!-- Upcoming movies will be appended here via JS -->
            </div>
            <div class="fade-right" id="fadeRightupcoming"></div>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
    <script type="module" src="js/logout.js"></script>
</body>

</html>
