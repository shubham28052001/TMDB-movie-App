<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Detail | Cinema Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #05070a;
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .hero-section {
            position: relative;
            width: 100%;
            height: 70vh;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
        }

        .backdrop-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(40%);
        }

        .hero-section::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #05070a 0%, transparent 100%);
        }

        .main-content {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: -150px auto 50px auto;
            padding: 0 20px;
            display: flex;
            gap: 40px;
        }

        .poster-container {
            flex-shrink: 0;
            width: 300px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateY(0);
        }

        .poster-container img {
            width: 100%;
            display: block;
        }

        .info-panel {
            flex: 1;
            padding-top: 60px;
        }

        .info-panel h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0;
            line-height: 1.1;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .meta-row {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            color: #00d2ff;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .overview {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #94a3b8;
            margin-bottom: 30px;
            max-width: 800px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .stat-card small {
            display: block;
            color: #94a3b8;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .stat-card span {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .genres {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .genres span {
            background: rgba(0, 210, 255, 0.1);
            color: #00d2ff;
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(0, 210, 255, 0.2);
        }

        .trailer-section {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .trailer-section h2 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .trailer-section h2::before {
            content: '';
            width: 4px;
            height: 25px;
            background: #00d2ff;
            border-radius: 10px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
                align-items: center;
                margin-top: -100px;
                text-align: center;
            }

            .info-panel {
                padding-top: 20px;
            }

            .info-panel h1 {
                font-size: 2.5rem;
            }

            .meta-row,
            .genres {
                justify-content: center;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>

    <div id="movieDetail">
    </div>

    <div class="trailer-section" id="trailerContainer">
    </div>

    <script>
        const API_KEY = 'b1bbbc80a37c2eb97c159a9352840008';
        const movie = JSON.parse(localStorage.getItem("selectedMovie"));
        const container = document.getElementById("movieDetail");
        const trailerContainer = document.getElementById("trailerContainer");

        if (!movie) {
            container.innerHTML = "<h2 style='text-align:center; padding-top:100px;'>No movie selected!</h2>";
        } else {
            const genres = movie.genre_ids ? movie.genre_ids.map(id => `<span>Genre ${id}</span>`).join('') : '';
            const backdropUrl = movie.backdrop_path 
    ? `https://image.tmdb.org/t/p/original${movie.backdrop_path}` 
    : 'https://images.unsplash.com/photo-1535016120720-40c646be5580?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D';

            container.innerHTML = `
                <div class="hero-section">
                    <img class="backdrop-image" src="${backdropUrl}" alt="backdrop">
                </div>
                <div class="main-content">
                    <div class="poster-container">
                        <img src="https://image.tmdb.org/t/p/w500${movie.poster_path}" alt="${movie.title}">
                    </div>
                    <div class="info-panel">
                        <h1>${movie.title || movie.name}</h1>
                        <div class="meta-row">
                            <span>📅 ${movie.release_date || "N/A"}</span>
                            <span>⭐ ${movie.vote_average || "0"}/10</span>
                            <span>🔞 ${movie.adult ? "Adult 18+" : "Family Friendly"}</span>
                        </div>
                        <p class="overview">${movie.overview || "No description available."}</p>
                        
                        <div class="stats-grid">
                            <div class="stat-card">
                                <small>Popularity</small>
                                <span>${Math.round(movie.popularity)}</span>
                            </div>
                            <div class="stat-card">
                                <small>Votes</small>
                                <span>${movie.vote_count}</span>
                            </div>
                            <div class="stat-card">
                                <small>Original Lang</small>
                                <span>${movie.original_language?.toUpperCase()}</span>
                            </div>
                        </div>

                        <div class="genres">${genres}</div>
                    </div>
                </div>
            `;

            fetchtrailer(movie.id);
        }

        async function fetchtrailer(id) {
            try {
                const response = await fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}&language=en-US`);
                const data = await response.json();
                const trailer = data.results.find(v => v.type === "Trailer" && v.site === "YouTube");

                if (trailer) {
                    trailerContainer.innerHTML = `
                        <h2>Watch Trailer</h2>
                        <div class="video-wrapper">
                            <iframe src="https://www.youtube.com/embed/${trailer.key}" allowfullscreen></iframe>
                        </div>`;
                } else {
                    trailerContainer.innerHTML = "<p style='color: #64748b;'>Trailer not available for this title.</p>";
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }
    </script>
</body>

</html>
